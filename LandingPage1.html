<!DOCTYPE html>
<html lang="en">

<title>Welcome | GramaBazaar</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="h-screen bg-cover bg-center flex items-center justify-center"
style="background-image:url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');">

<!-- Dark overlay -->
<div class="absolute inset-0 bg-black/50"></div>

<!-- Welcome Card -->
<div class="relative bg-white p-10 rounded-2xl shadow-2xl max-w-xl text-center">

<!-- Logo -->
<img src="images/logo.png" class="w-20 mx-auto mb-4">

<h1 class="text-4xl font-bold text-green-700 mb-4">

Support farmers and experience real village quality.

<button

</button>

<script>

}
