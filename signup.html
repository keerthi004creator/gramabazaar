<!DOCTYPE html>
<html>
<head>
  <title>Register | GramaBazaar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-96">
  <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

  <input id="email" type="email" placeholder="Email" class="border p-2 w-full mb-4">
  <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4">
  <input id="confirmPassword" type="password" placeholder="Confirm Password" class="border p-2 w-full mb-4">

  <button id="registerBtn" class="bg-green-600 text-white w-full py-2 rounded">Register</button>

  <p class="text-sm mt-4 text-center">
    Already have an account? <a href="login.html" class="text-blue-500">Login</a>
  </p>
</div>

<script type="module" src="/js/signup.js"></script>
</body>
</html>
