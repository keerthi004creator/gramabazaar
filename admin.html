<!DOCTYPE html>
<html>

<head>

<title>GramaBazaar Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-green-50">

<h1 class="text-3xl font-bold text-center mt-8">
GramaBazaar Admin Panel
</h1>

<div class="max-w-md mx-auto bg-white p-6 mt-10 rounded shadow">

<input id="name" placeholder="Product Name"
class="w-full border p-2 mb-3 rounded">

<input id="price" placeholder="Price"
class="w-full border p-2 mb-3 rounded">

<input id="image" placeholder="Image URL"
class="w-full border p-2 mb-3 rounded">

<textarea id="description"
placeholder="Description"
class="w-full border p-2 mb-3 rounded"></textarea>

<button onclick="addProduct()"
class="bg-green-700 text-white w-full py-2 rounded">
Add Product
</button>
<br>
<a href="orders.html" class="text-green-700 mt-4 block text-center">View Orders</a>
</div>

<script type="module" src="js/admin.js"></script>

</body>

</html>
