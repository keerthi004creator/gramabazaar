<!DOCTYPE html>
<html>
<head>
  <title>GramaBazaar Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="p-4 bg-green-600 text-white flex justify-between">

  <span class="font-bold text-lg">GramaBazaar</span>

  <div class="space-x-4">
    <a href="index.html" class="hover:underline">Home</a>

    <a href="cart.html" class="hover:underline">
      Cart (<span id="cart-count">0</span>)
    </a>
  </div>

</nav>

<div class="p-8">

  <h1 class="text-3xl font-bold mb-6">Shop by Category</h1>

  <!-- Categories -->
  <div id="categories" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>

  <!-- Products -->
  <div id="products" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
    <p class="text-gray-500">Click a category to view products</p>

<script type="module" src="js/store.js"></script>

</html>
