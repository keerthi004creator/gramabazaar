<!DOCTYPE html>
<html>
<head>
  <title>Login | GramaBazaar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-96">
  <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

  <input id="email" type="email" placeholder="Email" class="border p-2 w-full mb-4">
  <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4">

  <button id="loginBtn" class="bg-blue-600 text-white w-full py-2 rounded">Login</button>

  <!-- Error message placeholder -->
  <p id="errorMsg" class="text-red-500 text-sm mt-2 text-center hidden"></p>

  <p class="text-sm mt-4 text-center">
    Don't have an account? <a href="signup.html" class="text-green-500">Register</a>
  </p>
</div>

<script type="module" src="/js/login.js"></script>
</body>
</html>
